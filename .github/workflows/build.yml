name: Build Minecraft Plugin/Mod

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Tên thư mục (để TRỐNG để tự động tìm thư mục chứa mod/plugin)'
        required: false
        type: string
        default: ''
      java_version:
        description: 'Phiên bản Java (17 cho Forge 1.20.1)'
        required: true
        type: choice
        options:
          - '17'
          - '21'
        default: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ github.event.inputs.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ github.event.inputs.java_version }}
          distribution: 'temurin'

      # Ép GitHub sử dụng đúng Gradle 8.4 (Tương thích hoàn hảo với Forge 1.20.1)
      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Auto-detect and Build
        run: |
          PROJECT_DIR="${{ github.event.inputs.project }}"
          
          if [ -z "$PROJECT_DIR" ]; then
            echo "🔍 Không nhập tên thư mục, đang tự động quét dự án..."
            PROJECT_DIR=$(find . -mindepth 2 -name "build.gradle" -exec dirname {} \; | head -n 1)
            
            if [ -z "$PROJECT_DIR" ]; then
              echo "❌ Không tìm thấy bất kỳ thư mục nào chứa file build.gradle!"
              exit 1
            fi
            echo "✅ Đã tìm thấy dự án tại: $PROJECT_DIR"
          fi
          
          cd "$PROJECT_DIR"
          
          # FIX TRIỆT ĐỂ: Tự động ép tạo file settings.gradle chuẩn ngay tại thư mục build
          echo "Tạo cấu hình plugin phụ trợ cho Forge..."
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  maven { url = 'https://maven.minecraftforge.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          rootProject.name = 'ramopt'
          EOF
          
          # Chạy build
          gradle build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Build-Result
          path: |
            **/build/libs/*.jar
            !**/build/libs/*-dev.jar
            !**/build/libs/*-sources.jar
