name: Build Minecraft Plugin/Mod

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Tên thư mục project cần build (VD: tool3x3, ram-optimizer)'
        required: true
        type: string
        default: 'ram-optimizer'
      java_version:
        description: 'Phiên bản Java (17 cho MC 1.18-1.20.4, 21 cho MC 1.20.5+)'
        required: true
        type: choice
        options:
          - '17'
          - '21'
        default: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ github.event.inputs.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ github.event.inputs.java_version }}
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Verify project directory exists
        run: |
          if [ ! -d "${{ github.event.inputs.project }}" ]; then
            echo "❌ Thư mục '${{ github.event.inputs.project }}' không tồn tại!"
            echo "Hãy kiểm tra lại tên project."
            exit 1
          fi

      - name: Grant Execute Permission & Setup Wrapper
        working-directory: ${{ github.event.inputs.project }}
        run: |
          if [ ! -f gradlew ]; then
            echo "Khởi tạo Gradle Wrapper..."
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      - name: Build with Gradle
        working-directory: ${{ github.event.inputs.project }}
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project }}-build
          # Chỉ giữ lại file .jar chính, bỏ các file rác của Fabric
          path: |
            ${{ github.event.inputs.project }}/build/libs/*.jar
            !${{ github.event.inputs.project }}/build/libs/*-dev.jar
            !${{ github.event.inputs.project }}/build/libs/*-sources.jar
