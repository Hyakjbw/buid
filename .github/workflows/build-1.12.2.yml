name: Build RAM Opt 1.12.2

on:
  push:
    paths:
      - 'ram-opt-1.12.2/**'
  pull_request:
    paths:
      - 'ram-opt-1.12.2/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ram-opt-1.12.2/gradlew || true

      - name: Build with Gradle
        run: |
          cd ram-opt-1.12.2
          ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: RamOpt-1.12.2
          path: ram-opt-1.12.2/build/libs/*.jar
