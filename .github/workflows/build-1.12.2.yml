name: Build RAM Opt 1.12.2

on:
  push:
    paths:
      - 'ram-opt-1.12.2/**'
  pull_request:
    paths:
      - 'ram-opt-1.12.2/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Thêm bộ nhớ đệm để không phải tải lại Gradle và dependencies mỗi lần build
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: |
          if [ -f ram-opt-1.12.2/gradlew ]; then
            chmod +x ram-opt-1.12.2/gradlew
          fi

      - name: Build with Gradle
        run: |
          cd ram-opt-1.12.2
          ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RamOpt-1.12.2
          path: ram-opt-1.12.2/build/libs/*.jar
